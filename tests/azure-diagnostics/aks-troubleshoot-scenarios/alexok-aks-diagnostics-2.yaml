          args:
            - sleep 3600
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: c2-allow-http-only
  namespace: default
  labels:
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-dns-policy
    scenario: network-policy-blocks-dns
spec:
  podSelector:
    matchLabels:
      app: c2-dns-client
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 80
---
