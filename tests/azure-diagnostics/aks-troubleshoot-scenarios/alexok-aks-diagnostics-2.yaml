---
apiVersion: v1
kind: Service
metadata:
  name: c2-internal-lb
  namespace: default
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-internal-subnet: missing-diagnostics-subnet
  labels:
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-load-balancer
    scenario: load-balancer-invalid-subnet
spec:
  type: LoadBalancer
  selector:
    app: c2-lb-backend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: c2-missing-storageclass
  namespace: default
  labels:
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-pvc-pending
    scenario: missing-storage-class
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: missing-diagnostics-sc
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: c2-pvc-consumer
  namespace: default
  labels:
    app: c2-pvc-consumer
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-pvc-pending
    scenario: missing-storage-class
spec:
  containers:
    - name: app
      image: "busybox:1.36"
      command:
        - /bin/sh
        - "-c"
      args:
        - sleep 3600
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: c2-missing-storageclass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2-dns-client
  namespace: default
  labels:
    app: c2-dns-client
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-dns-policy
    scenario: network-policy-blocks-dns
spec:
  replicas: 1
  selector:
    matchLabels:
