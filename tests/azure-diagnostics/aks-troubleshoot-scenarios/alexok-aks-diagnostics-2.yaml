spec:
  replicas: 1
  selector:
    matchLabels:
      app: internal-api
  template:
    metadata:
      labels:
        app: internal-api
        azure-diagnostics-test: "true"
        diagnostics-scenario-namespace: c2-network-policy
        scenario: default-deny-egress
    spec:
      containers:
        - name: web
          image: "nginx:1.27-alpine"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: c2-internal-api
  namespace: default
  labels:
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-network-policy
    scenario: default-deny-egress
spec:
  selector:
    app: internal-api
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2-net-client
  namespace: default
  labels:
    app: net-client
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-network-policy
    scenario: default-deny-egress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: net-client
  template:
    metadata:
      labels:
        app: net-client
        azure-diagnostics-test: "true"
        diagnostics-scenario-namespace: c2-network-policy
        scenario: default-deny-egress
    spec:
      containers:
        - name: client
          image: "busybox:1.36"
          command:
            - /bin/sh
            - "-c"
          args:
            - sleep 3600
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: c2-deny-client-egress
  namespace: default
  labels:
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-network-policy
    scenario: default-deny-egress
spec:
  podSelector:
    matchLabels:
      app: net-client
  policyTypes:
    - Egress
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2-lb-backend
  namespace: default
  labels:
    app: c2-lb-backend
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-load-balancer
    scenario: load-balancer-invalid-subnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: c2-lb-backend
  template:
    metadata:
      labels:
        app: c2-lb-backend
        azure-diagnostics-test: "true"
        diagnostics-scenario-namespace: c2-load-balancer
        scenario: load-balancer-invalid-subnet
    spec:
      containers:
        - name: web
          image: "nginx:1.27-alpine"
