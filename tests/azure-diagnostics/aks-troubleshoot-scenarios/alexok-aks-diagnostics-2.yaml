## Cluster: alexok-aks-diagnostics-2
## Type: Kubernetes service
## Location: Sweden Central
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2-readiness-wrong-port
  namespace: default
  labels:
    app: c2-readiness-wrong-port
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-readiness-port
    scenario: readiness-probe-wrong-port
spec:
  replicas: 1
  selector:
    matchLabels:
      app: c2-readiness-wrong-port
  template:
    metadata:
      labels:
        app: c2-readiness-wrong-port
        azure-diagnostics-test: "true"
        diagnostics-scenario-namespace: c2-readiness-port
        scenario: readiness-probe-wrong-port
    spec:
      containers:
        - name: web
          image: "nginx:1.27-alpine"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: c2-readiness-wrong-port
  namespace: default
  labels:
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-readiness-port
    scenario: readiness-probe-wrong-port
spec:
  selector:
    app: c2-readiness-wrong-port
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2-memory-hog
  namespace: default
  labels:
    app: c2-memory-hog
    azure-diagnostics-test: "true"
    diagnostics-scenario-namespace: c2-oom
    scenario: oomkilled-memory-limit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: c2-memory-hog
  template:
    metadata:
      labels:
        app: c2-memory-hog
        azure-diagnostics-test: "true"
        diagnostics-scenario-namespace: c2-oom
        scenario: oomkilled-memory-limit
    spec:
      containers:
        - name: app
          image: "python:3.12-alpine"
          command:
            - python
            - "-c"
          args:
            - import time; data = bytearray(128 * 1024 * 1024); time.sleep(3600)
          resources:
            requests:
              memory: 16Mi
              cpu: 25m
            limits:
              memory: 32Mi
              cpu: 250m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2-internal-api
  namespace: default
  labels:
    app: internal-api
    azure-diagnostics-test: "true"
